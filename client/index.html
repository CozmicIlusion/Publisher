<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Cozmic - The Future of News</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Cozmic is a next-generation news platform delivering tech, gaming, culture, lifestyle, and music stories for the connected generation. Curated by AI, verified by humans." />
    <meta name="keywords" content="news, tech news, gaming news, culture, lifestyle, music, gen z, AI curated news, digital media" />
    <meta name="author" content="Cozmic" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://cozmic.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cozmic.com/" />
    <meta property="og:title" content="Cozmic - The Future of News" />
    <meta property="og:description" content="Tech, gaming, culture, lifestyle, and music — curated by AI, verified by humans. Your daily dose of what matters." />
    <meta property="og:image" content="https://cozmic.com/og-image.png" />
    <meta property="og:site_name" content="Cozmic" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cozmic.com/" />
    <meta name="twitter:title" content="Cozmic - The Future of News" />
    <meta name="twitter:description" content="Tech, gaming, culture, lifestyle, and music — curated by AI, verified by humans." />
    <meta name="twitter:image" content="https://cozmic.com/og-image.png" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0A0A1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Cozmic",
      "url": "https://cozmic.com",
      "logo": "https://cozmic.com/logo.png",
      "description": "Next-generation news platform for the connected generation",
      "sameAs": [],
      "publishingPrinciples": "https://cozmic.com/about",
      "actionableFeedbackPolicy": "https://cozmic.com/contact"
    }
    </script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="Cozmic RSS Feed" href="/rss.xml" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
